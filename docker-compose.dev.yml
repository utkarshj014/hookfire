services:
  postgres:
    image: postgres:16-alpine
    container_name: hookfire-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-hookfire}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:8-alpine
    container_name: hookfire-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-my-redis-secure-password}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  api:
    build:
      context: ./api
      dockerfile: Dockerfile.dev
    container_name: hookfire-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-hookfire}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-my-redis-secure-password}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-12345678901234567890123456789012}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-global-webhook-fallback-secret}
      PORT: 3000
      NODE_ENV: development
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000}
      APP_URL: ${APP_URL:-http://api:3000}
    depends_on:
      - postgres
      - redis

  fanout-worker:
    build:
      context: ./api
      dockerfile: Dockerfile.dev
    container_name: hookfire-fanout-worker
    restart: unless-stopped
    command: npm run fanOut-worker
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-hookfire}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-my-redis-secure-password}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-12345678901234567890123456789012}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-global-webhook-fallback-secret}
      NODE_ENV: development
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000}
      APP_URL: ${APP_URL:-http://api:3000}
    depends_on:
      - postgres
      - redis

  webhook-worker:
    build:
      context: ./api
      dockerfile: Dockerfile.dev
    container_name: hookfire-webhook-worker
    restart: unless-stopped
    command: npm run webhook-worker
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-hookfire}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-my-redis-secure-password}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-12345678901234567890123456789012}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-global-webhook-fallback-secret}
      NODE_ENV: development
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000}
      APP_URL: ${APP_URL:-http://api:3000}
    depends_on:
      - postgres
      - redis

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile.dev
    container_name: hookfire-dashboard
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
